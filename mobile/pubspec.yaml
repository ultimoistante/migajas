name: migajas_mobile
description: Migajas - Android client
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP client
  dio: ^5.7.0

  # State management
  flutter_riverpod: ^2.6.1

  # Routing
  go_router: ^14.6.1

  # Secure storage
  flutter_secure_storage: ^9.2.2

  # Preferences (theme)
  shared_preferences: ^2.3.2

  # Rich text editor
  flutter_quill: ^11.5.0
  flutter_quill_delta_from_html: ^1.5.3   # HTML → Quill Delta
  vsc_quill_delta_to_html: ^1.0.5         # Quill Delta → HTML

  # File picking / media
  file_picker: ^8.1.2
  image_picker: ^1.1.2
  path_provider: ^2.1.4
  mime: ^1.0.6

  # Audio recording & playback
  record: ^6.0.0
  audioplayers: ^6.1.0

  # Image lightbox
  photo_view: ^0.15.0

  # HTML rendering (view mode)
  flutter_widget_from_html: ^0.15.2

  # Utilities
  intl: ^0.20.0
  url_launcher: ^6.3.1
  open_filex: ^4.6.0
  http_parser: ^4.1.1
  uuid: ^4.5.1
  cached_network_image: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
